name: Gerar APK Flutter pelo ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "central_player_flutter_projeto_apk.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Descompactar ZIP
        run: |
          rm -rf projeto app
          unzip -q central_player_flutter_projeto_apk.zip -d projeto
          echo "Arquivos encontrados:"
          find projeto -maxdepth 4 -type f | sort

      - name: Encontrar projeto Flutter
        id: find_project
        run: |
          PROJECT_SRC=$(find projeto -name pubspec.yaml -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_SRC" ]; then
            echo "Nenhum pubspec.yaml encontrado dentro do ZIP."
            exit 1
          fi

          echo "src=$PROJECT_SRC" >> "$GITHUB_OUTPUT"
          echo "Projeto encontrado em: $PROJECT_SRC"

      - name: Criar base Android Flutter
        run: |
          flutter create app --platforms=android --project-name central_player

      - name: Copiar arquivos do projeto para a base Android
        run: |
          cp -R "${{ steps.find_project.outputs.src }}/." app/
          echo "Conteúdo final do app:"
          find app -maxdepth 3 -type f | sort

      - name: Baixar dependências
        working-directory: app
        run: flutter pub get

      - name: Gerar APK Debug
        working-directory: app
        run: flutter build apk --debug

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: central-player-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
