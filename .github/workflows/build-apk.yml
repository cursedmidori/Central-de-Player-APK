name: Gerar APK Flutter Corrigido

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Preparar projeto
        shell: bash
        run: |
          set -e
          if [ ! -f pubspec.yaml ]; then
            ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1 || true)
            if [ -z "$ZIP_FILE" ]; then
              echo "Nenhum pubspec.yaml ou ZIP encontrado na raiz do repositório."
              exit 1
            fi
            echo "Descompactando $ZIP_FILE"
            rm -rf extracted
            mkdir extracted
            unzip -q "$ZIP_FILE" -d extracted
            PROJECT_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)
            if [ -z "$PROJECT_DIR" ]; then
              echo "Nenhum pubspec.yaml encontrado dentro do ZIP."
              exit 1
            fi
            echo "Projeto encontrado em $PROJECT_DIR"
            cp -R "$PROJECT_DIR"/. .
          fi

      - name: Corrigir main.dart automaticamente
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          from pathlib import Path
          old = "mapi(d['stats'])"
          new = "Map<String, dynamic>.from(d['stats'] as Map)"
          fixed = 0
          for path in Path('.').rglob('main.dart'):
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new), encoding='utf-8')
                  print(f'Corrigido: {path}')
                  fixed += 1
          if fixed == 0:
              print('Nenhuma ocorrência antiga encontrada. O main.dart já parece corrigido.')
          PY
          if grep -R "mapi(d\['stats'\])" -n lib 2>/dev/null; then
            echo "Ainda existe mapi(d['stats']) em lib/. Corrija o main.dart."
            exit 1
          fi

      - name: Criar Android se não existir
        run: flutter create --platforms=android --project-name central_player .

      - name: Baixar dependências
        run: flutter pub get

      - name: Gerar APK Debug
        run: flutter build apk --debug

      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: central-player-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
